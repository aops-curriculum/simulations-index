    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    }
    header .subtitle {

      opacity: 0.88;
    }

    /* ── Controls ── */
    .controls {
      position: relative;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 10px;
    }

    .controls input[type="text"] {
      flex: 1 1 220px;
      min-width: 160px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      font-size: 0.82rem;
      outline: none;
    }

    /* custom multi-select dropdown */
    .dropdown-wrap {
      position: relative;
    }
    .dropdown-btn {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: white;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .dropdown-panel {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      padding: 8px;
      min-width: 220px;
      z-index: 100;
    }
    .dropdown-panel.open { display: block; }
    .dropdown-actions {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .dropdown-actions button {
      flex: 1;
      padding: 4px;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.76rem;
      background: #f9f9f9;
    }
    .dropdown-actions button:hover { background: #eee; }
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 3px 4px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .dropdown-item:hover { background: #f3f4f6; }
    .dropdown-item input { accent-color: #7c3aed; }

    select.sort-select {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      font-size: 0.82rem;
      background: white;
      cursor: pointer;
      outline: none;
    }

    .group-check {
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .group-check input { accent-color: white; }

    /* ── Results info ── */
    .results-info {
      color: rgba(255,255,255,0.82);
      font-size: 0.78rem;
      padding: 0 2px 8px;
    }

    /* ── Group header ── */
    .group-header {
      color: white;
      font-size: 1rem;
      font-weight: 600;
      margin: 18px 0 8px;
      padding-bottom: 6px;
      border-bottom: 2px solid rgba(255,255,255,0.3);
    }

    /* ── Grid & Cards ── */
    .sim-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .sim-card {
      position: relative;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .sim-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    }

    /* Copy-GitHub-Pages-URL button (top-right of each card) */
    .copy-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      z-index: 5;
      width: 22px;
      height: 22px;
      padding: 0;
      border: none;
      border-radius: 5px;
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 0.78rem;
      line-height: 22px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.12s, background 0.12s;
    }
    .sim-card:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: rgba(0,0,0,0.75); }
    .copy-btn.copied { background: #16a34a; opacity: 1; }

    .card-preview {
      height: 80px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
    }
    .card-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 6px 8px 8px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
    }

    .card-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: #222;
      line-height: 1.3;
    }

    .course-badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.62rem;
      font-weight: 600;
      color: white;
      white-space: nowrap;
      max-width: fit-content;
    }

    .card-desc {
      font-size: 0.67rem;
      color: #555;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-dates {
      font-size: 0.6rem;
      color: #999;
      margin-top: auto;
      padding-top: 2px;
    }

    .card-url {
      font-size: 0.58rem;
      color: #aaa;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .no-results {
      color: rgba(255,255,255,0.8);
      text-align: center;
      padding: 40px 0;
      font-size: 1rem;
    }

    footer {
      text-align: center;
      color: rgba(255,255,255,0.65);
      font-size: 0.8rem;
      margin-top: 30px;
    }

    @media (max-width: 480px) {
      header h1 { font-size: 1.4rem; }
      .sim-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    }
  </style>
</head>

// Build course lookup
const courseById = {};
for (const c of COURSES) courseById[c.id] = c;

// ── State ──
let searchQuery = '';
let enabledCourses = new Set(COURSES.map(c => c.id));
let sortMode = 'nameAZ';
let groupByCourse = false;
let searchTimer = null;

// ── Build checkbox list ──
const checkboxesDiv = document.getElementById('courseCheckboxes');
for (const c of COURSES) {
  const label = document.createElement('label');
  label.className = 'dropdown-item';
  label.innerHTML = `<input type="checkbox" checked data-course="${c.id}"> ${c.id} – ${escHtml(c.name)}`;
  checkboxesDiv.appendChild(label);
  label.querySelector('input').addEventListener('change', () => { updateCourseState(); render(); });
}

document.getElementById('allOnBtn').addEventListener('click', () => {
  checkboxesDiv.querySelectorAll('input').forEach(cb => cb.checked = true);
  updateCourseState(); render();
});
document.getElementById('allOffBtn').addEventListener('click', () => {
  checkboxesDiv.querySelectorAll('input').forEach(cb => cb.checked = false);
  updateCourseState(); render();
});

function updateCourseState() {
  enabledCourses = new Set();
  checkboxesDiv.querySelectorAll('input').forEach(cb => {
    if (cb.checked) enabledCourses.add(cb.dataset.course);
  });
  const n = enabledCourses.size;
  document.getElementById('courseDropBtn').textContent = `Courses (${n}/${COURSES.length})`;
}

// Dropdown toggle
const dropBtn = document.getElementById('courseDropBtn');
const dropPanel = document.getElementById('courseDropPanel');
dropBtn.addEventListener('click', e => { e.stopPropagation(); dropPanel.classList.toggle('open'); });
document.addEventListener('click', () => dropPanel.classList.remove('open'));
dropPanel.addEventListener('click', e => e.stopPropagation());

// Search with debounce
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQuery = e.target.value.toLowerCase(); render(); }, 300);
});

// Sort
document.getElementById('sortSelect').addEventListener('change', e => { sortMode = e.target.value; render(); });

// Copy GitHub Pages URL (delegated; don't follow the card link)
document.getElementById('content').addEventListener('click', e => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  e.preventDefault();
  e.stopPropagation();
  const url = btn.dataset.url || '';
  const done = () => {
    const old = btn.textContent;
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = old; btn.classList.remove('copied'); }, 1100);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(done).catch(() => {
      window.prompt('Copy this GitHub Pages URL:', url);
    });
  } else {
    window.prompt('Copy this GitHub Pages URL:', url);
  }
});

// Group
document.getElementById('groupCheck').addEventListener('change', e => { groupByCourse = e.target.checked; render(); });

// ── Helpers ──
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch(_) { return '—'; }
}

let currentScoreMap = null; // Map<sim, hitCount> set by getFiltered() for multi-term searches

function sortSims(arr) {
  return [...arr].sort((a, b) => {
    if (currentScoreMap) {
      const diff = (currentScoreMap.get(b) || 0) - (currentScoreMap.get(a) || 0);
      if (diff !== 0) return diff;
    }
    switch (sortMode) {
      case 'nameAZ': return a.title.localeCompare(b.title);
      case 'nameZA': return b.title.localeCompare(a.title);
      case 'createdOld': return (a.dateCreated || '').localeCompare(b.dateCreated || '');
      case 'createdNew': return (b.dateCreated || '').localeCompare(a.dateCreated || '');
      case 'editedOld': return (a.dateModified || '').localeCompare(b.dateModified || '');
      case 'editedNew': return (b.dateModified || '').localeCompare(a.dateModified || '');
      default: return 0;
    }
  });
}

function makeCard(sim) {
  const colors = COURSE_COLORS[sim.courseId] || { badge:'#666', light:'#eee', gradient:'linear-gradient(135deg,#eee,#999)' };
  const emoji = COURSE_EMOJI[sim.courseId] || '📄';
  const course = courseById[sim.courseId];
  const courseName = course ? `${course.id} – ${course.name}` : sim.courseId;
  // Cards link to the LIVE GitHub Pages URL of the sim (cross-repo, absolute).
  const link = sim.pagesUrl || sim.url;

  const preview = sim.screenshotUrl
    ? `<img src="${escHtml(sim.screenshotUrl)}" alt="${escHtml(sim.title)}" loading="lazy">`
    : `<span>${emoji}</span>`;
  const previewStyle = sim.screenshotUrl ? '' : `style="background:${colors.gradient}"`;

  const desc = sim.description ? `<div class="card-desc">${escHtml(sim.description)}</div>` : '';
  const created = fmtDate(sim.dateCreated);
  const edited = fmtDate(sim.dateModified);
  const datesHtml = (created !== '—' || edited !== '—')
    ? `<div class="card-dates">Created: ${created} · Edited: ${edited}</div>`
    : '';

  return `<a href="${escHtml(link)}" class="sim-card" target="_blank" rel="noopener">
  <button class="copy-btn" type="button" title="Copy GitHub Pages URL" data-url="${escHtml(link)}">⧉</button>
  <div class="card-preview" ${previewStyle}>${preview}</div>
  <div class="card-body">
    <div class="card-title">${escHtml(sim.title)}</div>
    <div><span class="course-badge" style="background:${colors.badge}">${escHtml(courseName)}</span></div>
    ${desc}
    ${datesHtml}
    <div class="card-url" title="${escHtml(link)}">${escHtml(link)}</div>
  </div>
</a>`;
}

// ── Render ──
// Returns last path segment of a URL, normalized for searching
// e.g. "175_PhysicsWOOT_1/under_pressure.html" → "under pressure"
function simSlug(s) {
  const parts = s.url.split('/');
  return (parts[parts.length - 1] || '').replace(/.html$/i, '').replace(/[-_]/g, ' ');
}

function getFiltered() {
  const raw = searchQuery.trim();
  const terms = raw ? raw.split(/s+/).filter(Boolean) : [];
  const isMultiTerm = terms.length > 1;
  currentScoreMap = isMultiTerm ? new Map() : null;

  const result = [];
  for (const s of SIMULATIONS) {
    if (!enabledCourses.has(s.courseId)) continue;
    if (terms.length === 0) {
      result.push(s);
    } else {
      const hay = (s.title + ' ' + s.description + ' ' + simSlug(s)).toLowerCase();
      let hits = 0;
      for (const t of terms) if (hay.includes(t)) hits++;
      if (hits > 0) {
        result.push(s);
        if (isMultiTerm) currentScoreMap.set(s, hits);
      }
    }
  }
  return result;
}

function render() {
  const filtered = getFiltered();
  const total = SIMULATIONS.length;
  document.getElementById('resultsInfo').textContent = `Showing ${filtered.length} of ${total} simulations`;

  const content = document.getElementById('content');

  if (filtered.length === 0) {
    content.innerHTML = '<div class="no-results">No simulations match your filters.</div>';
    return;
  }

  if (!groupByCourse) {
    const sorted = sortSims(filtered);
    content.innerHTML = `<div class="sim-grid">${sorted.map(makeCard).join('')}</div>`;
  } else {
    let html = '';
    for (const course of COURSES) {
      if (!enabledCourses.has(course.id)) continue;
      const courseSims = sortSims(filtered.filter(s => s.courseId === course.id));
      if (courseSims.length === 0) continue;
      html += `<div class="group-header">${escHtml(course.name)} (${courseSims.length})</div>`;
      html += `<div class="sim-grid">${courseSims.map(makeCard).join('')}</div>`;
    }
    content.innerHTML = html;
  }
}

render();
</script>
</body>
</html>
